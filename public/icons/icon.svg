<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a" />
      <stop offset="100%" stop-color="#050508" />
    </linearGradient>
    <!-- Ring Flow Gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <!-- Wave Accent Gradient -->
    <linearGradient id="waveGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.8" />
    </linearGradient>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <rect width="496" height="496" x="8" y="8" rx="120" fill="none" stroke="#27272a" stroke-width="4" stroke-opacity="0.4" />

  <!-- Flow Wave in Center Background -->
  <path d="M 120 280 C 180 200, 220 320, 300 240 C 350 200, 370 280, 400 220" fill="none" stroke="url(#waveGrad)" stroke-width="24" stroke-linecap="round" opacity="0.3" />

  <!-- Outer Ring Loop representing Refresh -->
  <path d="M 256 90 A 166 166 0 1 1 130 150" fill="none" stroke="url(#ringGrad)" stroke-width="36" stroke-linecap="round" filter="url(#glow)" />
  
  <!-- Arrow head at the end of the refresh ring -->
  <path d="M 130 110 L 130 170 L 190 170" fill="none" stroke="url(#ringGrad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Central Pulse Ring -->
  <circle cx="256" cy="256" r="48" fill="#ffffff" opacity="0.9" />
  <circle cx="256" cy="256" r="72" fill="none" stroke="#8b5cf6" stroke-width="8" stroke-dasharray="8 8" opacity="0.6" />
</svg>
